on:
  workflow_call:
    inputs:
      os:
        required: false
        description: 'runs-on property, ex: ubuntu-latest, windows-latest'
        type: string
        default: 'ubuntu-latest'
      command:
        required: false
        type: string
        default: yarn test:nuts
        description: 'command to execute (ex: yarn test:nuts)'

jobs:
  nut:
    name: ${{ inputs.command }}
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Setup Node
        uses: actions/setup-node@v4.0.1
        with:
          node-version: 18
          cache: yarn
          registry-url: 'https://registry.npmjs.org'

      - name: Install salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Yarn install
        run: yarn

      - name: Install plugin and Run NUT
        run: |
         echo y | sf plugins install apex-code-coverage-transformer@latest
         ${{ inputs.command }}
